# Grafana Alloy Helm chart values
# Chart: grafana/alloy
# Role: DaemonSet log collector -> pushes pod logs to Loki
# Uses loki.source.kubernetes (API-based, no host log mounts needed)
# Tolerates all taints (collects from backup, LLM, and control-plane nodes)
---
controller:
  type: daemonset
  tolerations:
    - operator: Exists

rbac:
  create: true

alloy:
  # HOSTNAME env is needed for node-scoped pod discovery
  extraEnv:
    - name: HOSTNAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName

  # No host log mounts needed - loki.source.kubernetes uses the K8s API
  mounts:
    varlog: false
    dockercontainers: false

  configMap:
    content: |
      discovery.kubernetes "pods" {
        role = "pod"
        selectors {
          role  = "pod"
          field = "spec.nodeName=" + sys.env("HOSTNAME")
        }
      }

      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
          separator     = "/"
          target_label  = "job"
        }
      }

      loki.source.kubernetes "pod_logs" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.write.default.receiver]
      }

      loki.write "default" {
        endpoint {
          url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

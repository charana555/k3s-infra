apiVersion: v1
kind: Secret
metadata:
  name: beszel-secrets
  namespace: monitoring
type: Opaque
stringData:
  # Token from Beszel Hub -> Settings -> Tokens (universal token)
  token: "YOUR_TOKEN_FROM_HUB"
  # Admin account credentials for the Beszel Hub web UI
  admin-email: "admin@charana.dev"
  admin-password: "YOUR_ADMIN_PASSWORD"

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: k8s-charana-dev-tls
  namespace: kubernetes-dashboard
spec:
  secretName: k8s-charana-dev-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - k8s.charana.dev
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: dashboard-transport
  namespace: kubernetes-dashboard
spec:
  insecureSkipVerify: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: kubernetes-dashboard
spec:
  redirectScheme:
    scheme: https
    permanent: true

---
# Template for Grafana admin credentials secret.
# Copy this file, fill in real values, and apply with kubectl.
# Or use: scripts/deploy-observability.sh (creates the secret interactively)
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: monitoring
type: Opaque
stringData:
  # Admin username for Grafana web UI
  admin-user: "admin"
  # Admin password for Grafana web UI - change this
  admin-password: "YOUR_GRAFANA_ADMIN_PASSWORD"

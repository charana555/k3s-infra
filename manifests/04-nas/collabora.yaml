---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: collabora-headers
  namespace: nas
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
    accessControlAllowMethods:
      - "GET"
      - "OPTIONS"
      - "PUT"
      - "POST"
    accessControlAllowOriginList:
      - "https://cloud.charana.dev"
    accessControlMaxAge: 100
    accessControlAllowHeaders:
      - "Authorization"
      - "Content-Type"
      - "X-Requested-With"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collabora
  namespace: nas
  labels:
    app: collabora
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: collabora
  template:
    metadata:
      labels:
        app: collabora
    spec:
      containers:
      - name: collabora
        image: collabora/code:latest
        ports:
        - containerPort: 9980
          protocol: TCP
        env:
        - name: aliasgroup1
          value: "https://cloud.charana.dev:443"
        - name: server_name
          value: "office.charana.dev"
        - name: extra_params
          value: "--o:ssl.enable=false --o:ssl.termination=true --o:net.frame_ancestors=cloud.charana.dev"
        - name: dictionaries
          value: "en"
        - name: username
          valueFrom:
            secretKeyRef:
              name: collabora-admin-secret
              key: username
        - name: password
          valueFrom:
            secretKeyRef:
              name: collabora-admin-secret
              key: password
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /hosting/capabilities
            port: 9980
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 6
        readinessProbe:
          httpGet:
            path: /hosting/capabilities
            port: 9980
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: collabora
  namespace: nas
  labels:
    app: collabora
spec:
  selector:
    app: collabora
  ports:
  - port: 80
    targetPort: 9980
    protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: collabora
  namespace: nas
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: nas-collabora-headers@kubernetescrd,kube-system-private-zone-only@kubernetescrd
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - office.charana.dev
    secretName: office-charana-dev-tls
  rules:
  - host: office.charana.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: collabora
            port:
              number: 80

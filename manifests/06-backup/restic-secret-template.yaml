---
apiVersion: v1
kind: Secret
metadata:
  name: restic-password
  namespace: backup
type: Opaque
stringData:
  password: "CHANGE_ME_TO_A_STRONG_PASSWORD"
---
# Usage:
# 1. Generate a strong password: openssl rand -base64 32
# 2. Create the secret on the cluster:
#    kubectl create secret generic restic-password \
#      --from-literal=password=YOUR_STRONG_PASSWORD \
#      -n backup
# 3. Delete this template file or keep it as reference (it has a placeholder)
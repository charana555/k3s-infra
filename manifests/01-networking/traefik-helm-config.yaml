# Traefik HelmChartConfig — preserves real source IP for ipAllowList to work.
#
# externalTrafficPolicy: Local prevents Kubernetes from SNATing the client
# IP before traffic reaches Traefik, so Tailscale IPs (100.x.x.x) are visible
# to the private-zone-only ipAllowList middleware.
#
# nodeSelector pins Traefik to charana-vps (the node that receives Tailscale
# traffic via split-DNS). With externalTrafficPolicy: Local, traffic is only
# forwarded to Traefik pods on the SAME node — so Traefik must run here.
#
# Combined with split-DNS (split-dns.yaml), Tailscale-on clients resolve
# private services to the Tailscale IP (100.126.165.111), traffic stays in
# the tunnel, and Traefik sees a 100.x source -> ipAllowList passes -> 200.
# Tailscale-off clients hit the public IP with their ISP IP -> 403.
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
  labels:
    managed-by: k3s-infra
spec:
  valuesContent: |-
    service:
      spec:
        externalTrafficPolicy: Local
    nodeSelector:
      kubernetes.io/hostname: charana-vps

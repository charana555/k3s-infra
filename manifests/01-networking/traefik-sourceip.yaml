---
# Preserve client source IP for Traefik so the private-zone ipAllowList
# middleware sees the real Tailscale 100.x address instead of a masqueraded
# flannel/kube-proxy IP.
#
# Root cause: k3s's klipper ServiceLB + flannel CNI SNAT host-originated
# traffic into the pod network, so Traefik sees 10.42.x.x — not the client
# IP. externalTrafficPolicy: Local alone does NOT fix this with klipper.
#
# Fix: hostNetwork: true makes Traefik bind the node's 80/443 directly —
# no klipper, no flannel hop, real source IP preserved. The Service is
# changed to ClusterIP so klipper stops owning 80/443 (prevents an
# iptables-DNAT conflict).
#
# Pinned to the always-on Oracle control-plane node (charana-vps) because
# DNS points to 80.225.224.42 and hostNetwork binds that node's interfaces.
#
# Apply: kubectl apply -f manifests/01-networking/traefik-sourceip.yaml
# Then:  kubectl delete ds svclb-traefik -n kube-system   (if it lingers)
---
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
  labels:
    managed-by: k3s-infra
spec:
  valuesContent: |-
    hostNetwork: true
    nodeSelector:
      kubernetes.io/hostname: charana-vps
    tolerations:
      - key: node-role.kubernetes.io/master
        effect: NoSchedule
      - key: node-role.kubernetes.io/control-plane
        effect: NoSchedule
    deployment:
      dnsPolicy: ClusterFirstWithHostNet
    service:
      spec:
        type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud
  namespace: nas
  labels:
    app: nextcloud
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nextcloud
  template:
    metadata:
      labels:
        app: nextcloud
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
      - name: fix-permissions
        image: busybox:1.36
        command: ["sh", "-c", "chown -R 33:1000 /var/www/data && chmod -R u+rwx,g+rX,o-rwx /var/www/data 2>/dev/null || true"]
        volumeMounts:
        - name: nextcloud-data
          mountPath: /var/www/data
      containers:
      - name: nextcloud
        image: nextcloud:30-apache
        ports:
        - containerPort: 80
          protocol: TCP
        env:
        - name: POSTGRES_HOST
          value: "postgres-shared"
        - name: POSTGRES_DB
          value: "nextcloud"
        - name: POSTGRES_USER
          value: "nextcloud"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nextcloud-secrets
              key: db-password
        - name: NEXTCLOUD_ADMIN_USER
          value: "admin"
        - name: NEXTCLOUD_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nextcloud-secrets
              key: admin-password
        - name: REDIS_HOST
          value: "nextcloud-redis"
        - name: REDIS_HOST_PORT
          value: "6379"
        - name: OVERWRITEPROTOCOL
          value: "https"
        - name: TRUSTED_PROXIES
          value: "10.42.0.0/16"
        - name: NEXTCLOUD_TRUSTED_DOMAINS
          value: "cloud.charana.dev"
        - name: NEXTCLOUD_DATA_DIR
          value: "/var/www/data"
        - name: PHP_MEMORY_LIMIT
          value: "512M"
        - name: PHP_UPLOAD_LIMIT
          value: "10G"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /status.php
            port: 80
            httpHeaders:
            - name: Host
              value: cloud.charana.dev
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /status.php
            port: 80
            httpHeaders:
            - name: Host
              value: cloud.charana.dev
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: nextcloud-html
          mountPath: /var/www/html
        - name: nextcloud-data
          mountPath: /var/www/data
        - name: media-data
          mountPath: /mnt/media
          readOnly: true
      volumes:
      - name: nextcloud-html
        persistentVolumeClaim:
          claimName: nextcloud-html
      - name: nextcloud-data
        hostPath:
          path: /mnt/data/nextcloud-data
          type: Directory
      - name: media-data
        hostPath:
          path: /mnt/data/media
          type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: nextcloud
  namespace: nas
  labels:
    app: nextcloud
spec:
  selector:
    app: nextcloud
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nextcloud
  namespace: nas
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "10G"
    traefik.ingress.kubernetes.io/router.middlewares: "nas-nextcloud-headers@kubernetescrd"
spec:
  tls:
  - hosts:
    - cloud.charana.dev
    secretName: cloud-charana-dev-tls
  rules:
  - host: cloud.charana.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nextcloud
            port:
              number: 80
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: nextcloud-headers
  namespace: nas
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
    stsSeconds: 15552000
    forceSTSHeader: true

---
# Hermes Agent - Secrets Template
#
# Usage:
# 1. Create hermes-telegram secret:
#    kubectl create secret generic hermes-telegram \
#      --from-literal=bot-token=YOUR_TELEGRAM_BOT_TOKEN \
#      --from-literal=allowed-users=YOUR_TELEGRAM_USER_ID \
#      -n apps
#
# 2. Create hermes-juspay-api-key secret:
#    kubectl create secret generic hermes-juspay-api-key \
#      --from-literal=api-key=YOUR_JUSPAY_API_KEY \
#      -n apps
#
# Get Telegram bot token from @BotFather on Telegram
# Get your Telegram user ID by messaging @userinfobot

apiVersion: v1
kind: Secret
metadata:
  name: hermes-telegram
  namespace: apps
type: Opaque
stringData:
  bot-token: "YOUR_TELEGRAM_BOT_TOKEN_HERE"
  allowed-users: "YOUR_TELEGRAM_USER_ID_HERE"

---
apiVersion: v1
kind: Secret
metadata:
  name: hermes-juspay-api-key
  namespace: apps
type: Opaque
stringData:
  api-key: "YOUR_JUSPAY_API_KEY_HERE"
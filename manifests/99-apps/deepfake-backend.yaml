---
# Deepfake detection FastAPI backend (public, CPU-only)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deepfake-backend
  namespace: apps
  labels:
    app: deepfake-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deepfake-backend
  template:
    metadata:
      labels:
        app: deepfake-backend
    spec:
      containers:
      - name: deepfake-backend
        image: vishu0/deepfake-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          protocol: TCP
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        startupProbe:
          httpGet:
            path: /docs
            port: 8000
          failureThreshold: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /docs
            port: 8000
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /docs
            port: 8000
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: deepfake-backend
  namespace: apps
  labels:
    app: deepfake-backend
spec:
  selector:
    app: deepfake-backend
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: deepfake-backend
  namespace: apps
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - deepfake-api.vishu.charana.dev
    secretName: deepfake-api-vishu-charana-dev-tls
  rules:
  - host: deepfake-api.vishu.charana.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: deepfake-backend
            port:
              number: 80

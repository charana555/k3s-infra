---
apiVersion: v1
kind: Secret
metadata:
  name: openrouter-api-key
  namespace: apps
type: Opaque
stringData:
  api-key: "sk-or-v1-YOUR_OPENROUTER_API_KEY_HERE"
---
# Usage:
# 1. Get your API key from: https://openrouter.ai/keys
# 2. Create the secret on the cluster:
#    kubectl create secret generic openrouter-api-key \
#      --from-literal=api-key=YOUR_ACTUAL_API_KEY \
#      -n apps
# 3. Delete this template file or keep it as reference (it has a placeholder)
# 4. Restart Open WebUI deployment to pick up the secret:
#    kubectl rollout restart deployment/open-webui -n apps
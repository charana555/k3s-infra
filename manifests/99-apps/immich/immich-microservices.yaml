---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-microservices
  namespace: nas
  labels:
    app: immich-microservices
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: immich-microservices
  template:
    metadata:
      labels:
        app: immich-microservices
    spec:
      initContainers:
      - name: wait-for-db
        image: postgres:16-alpine
        command:
        - /bin/sh
        - -c
        - |
          until pg_isready -h immich-postgres -p 5432 -U immich; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL is ready!"
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: immich-secrets
              key: postgres-password
      containers:
      - name: immich-microservices
        image: ghcr.io/immich-app/immich-server:v2.6.3
        env:
        - name: DB_HOSTNAME
          value: "immich-postgres"
        - name: DB_PORT
          value: "5432"
        - name: DB_USERNAME
          value: "immich"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: immich-secrets
              key: postgres-password
        - name: DB_DATABASE_NAME
          value: "immich"
        - name: REDIS_HOSTNAME
          value: "immich-redis"
        - name: REDIS_PORT
          value: "6379"
        - name: IMMICH_MACHINE_LEARNING_URL
          value: ""
        - name: IMMICH_WORKERS_INCLUDE
          value: "microservices"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        volumeMounts:
        - name: library
          mountPath: /usr/src/app/upload
      volumes:
      - name: library
        hostPath:
          path: /mnt/data/immich-library
          type: Directory

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  namespace: nas
  labels:
    app: immich-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: immich-server
  template:
    metadata:
      labels:
        app: immich-server
    spec:
      initContainers:
      - name: wait-for-db
        image: postgres:16-alpine
        command:
        - /bin/sh
        - -c
        - |
          until pg_isready -h immich-postgres -p 5432 -U immich; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL is ready!"
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: immich-secrets
              key: postgres-password
      containers:
      - name: immich-server
        image: ghcr.io/immich-app/immich-server:v2.6.3
        ports:
        - containerPort: 2283
          protocol: TCP
        env:
        - name: DB_HOSTNAME
          value: "immich-postgres"
        - name: DB_PORT
          value: "5432"
        - name: DB_USERNAME
          value: "immich"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: immich-secrets
              key: postgres-password
        - name: DB_DATABASE_NAME
          value: "immich"
        - name: REDIS_HOSTNAME
          value: "immich-redis"
        - name: REDIS_PORT
          value: "6379"
        - name: IMMICH_MACHINE_LEARNING_URL
          value: ""
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          tcpSocket:
            port: 2283
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 2283
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: library
          mountPath: /usr/src/app/upload
      volumes:
      - name: library
        hostPath:
          path: /mnt/data/immich-library
          type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: immich-server
  namespace: nas
  labels:
    app: immich-server
spec:
  selector:
    app: immich-server
  ports:
  - port: 80
    targetPort: 2283
    protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: immich-server
  namespace: nas
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - photos.charana.dev
    secretName: photos-charana-dev-tls
  rules:
  - host: photos.charana.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: immich-server
            port:
              number: 80

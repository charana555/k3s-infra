---
# Portfolio V2 Application Deployment
apiVersion: v1
kind: ServiceAccount
metadata:
  name: portfolio-sa
  namespace: apps
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-v2
  namespace: apps
  labels:
    app: portfolio-v2
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio-v2
  template:
    metadata:
      labels:
        app: portfolio-v2
        version: v1
    spec:
      serviceAccountName: portfolio-sa
      imagePullSecrets:
      - name: ghcr-credentials
      containers:
      - name: portfolio-v2
        image: ghcr.io/charana555/portfolio_v2:5a547148917f@sha256:6bcf5218d172d89106d96453a9aeabee6cb20444563821b3e24b04c2ff84e94b
        ports:
        - containerPort: 3000
          protocol: TCP
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-v2
  namespace: apps
  labels:
    app: portfolio-v2
spec:
  selector:
    app: portfolio-v2
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio-v2
  namespace: apps
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - charana.dev
    secretName: charana-dev-tls
  rules:
  - host: charana.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: portfolio-v2
            port:
              number: 80

# tg-media: on-demand Telegram media downloader for pavan-vps.
# Runs a control bot; send commands via Telegram from your phone.
# CLI commands also work via kubectl exec.
#
# First-time setup:
#   1. Create secrets:   ./scripts/create-tg-media-secrets.sh
#   2. Apply:             kubectl apply -f manifests/99-apps/media/tg-media.yaml
#   3. Login (interactive): kubectl exec -it deploy/tg-media -n media -- python /app/tg-media.py login
#   4. Restart pod:       kubectl rollout restart deployment tg-media -n media
#   5. Send /help to your bot in Telegram
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tg-media-script
  namespace: media
data:
  tg-media.py: |
    import argparse
    import os
    import sys
    import asyncio

    from telethon import TelegramClient, events

    DOWNLOAD_DIR = "/data/downloads/telegram"
    SESSION_PATH = "/data/session/tg-media"
    BOT_SESSION_PATH = "/data/session/tg-media-bot"
    MEDIA_UID = 1000
    MEDIA_GID = 1000

    JELLYFIN_HOST = os.environ.get("JELLYFIN_HOST", "http://jellyfin.media.svc.cluster.local:8096")
    JELLYFIN_API_KEY = os.environ.get("JELLYFIN_API_KEY", "")

    def get_credentials():
        api_id = os.environ.get("TELEGRAM_API_ID")
        api_hash = os.environ.get("TELEGRAM_API_HASH")
        if not api_id or not api_hash:
            print("Error: TELEGRAM_API_ID and TELEGRAM_API_HASH must be set")
            sys.exit(1)
        return int(api_id), api_hash

    def progress_callback(current, total):
        pct = (current / total * 100) if total else 0
        sys.stdout.write(f"\r  {current:,} / {total:,} bytes ({pct:.1f}%)")
        sys.stdout.flush()

    def fix_perms(path):
        if not os.path.exists(path):
            return
        for root, dirs, files in os.walk(path):
            os.chown(root, MEDIA_UID, MEDIA_GID)
            os.chmod(root, 0o775)
            for f in files:
                fp = os.path.join(root, f)
                os.chown(fp, MEDIA_UID, MEDIA_GID)
                os.chmod(fp, 0o664)

    def jellyfin_refresh():
        import urllib.request
        url = f"{JELLYFIN_HOST}/Library/Refresh?ApiKey={JELLYFIN_API_KEY}"
        req = urllib.request.Request(url, method="POST")
        try:
            with urllib.request.urlopen(req, timeout=10) as resp:
                return resp.status == 204
        except Exception:
            return False

    # --- Core functions (shared by CLI and bot) ---

    async def resolve_entity(client, chat):
        """Resolve chat ID/username to an entity. Handles bare IDs not in session cache."""
        try:
            return await client.get_entity(chat)
        except Exception:
            # Try as integer ID with InputPeer
            try:
                from telethon.tl.types import InputPeerUser, InputPeerChat, InputPeerChannel
                peer_id = int(chat)
                # Try user peer first (most common for bots)
                for peer_cls in (InputPeerUser, InputPeerChannel, InputPeerChat):
                    try:
                        return await client.get_entity(peer_cls(peer_id, 0))
                    except Exception:
                        continue
            except (ValueError, Exception):
                pass
            raise ValueError(f"Cannot find entity for '{chat}'. Try /chats to get the @username instead.")

    async def do_chats(client, limit):
        lines = [f"{'ID':>14}  {'Type':<7}  {'Name'}", "-" * 50]
        async for d in client.iter_dialogs(limit=limit):
            entity_type = "bot" if getattr(d.entity, "bot", False) else "channel" if hasattr(d.entity, "title") else "user"
            name = d.name or "(unknown)"
            lines.append(f"{d.id:>14}  {entity_type:<7}  {name}")
        return "\n".join(lines)

    async def do_recent(client, chat, limit):
        entity = await resolve_entity(client, chat)
        lines = [f"Recent messages from: {chat}\n"]
        msgs = await client.get_messages(entity, limit=limit)
        for m in reversed(msgs):
            has_media = "yes" if m.media else "no "
            date = m.date.strftime("%Y-%m-%d %H:%M") if m.date else "?"
            text = (m.text or "")[:60].replace("\n", " ")
            lines.append(f"  [{m.id:>6}]  {date}  media={has_media}  {text}")
        return "\n".join(lines)

    async def do_download(client, chat, target, reply=None, show_progress=False):
        async def out(msg):
            if reply:
                await reply(msg)
            else:
                print(msg)

        entity = await resolve_entity(client, chat)
        os.makedirs(DOWNLOAD_DIR, exist_ok=True)
        cb = progress_callback if show_progress else None

        if target.startswith("after-"):
            after_id = int(target.split("-", 1)[1])
            await out(f"Downloading all media after {after_id} from {chat}")
            count = 0
            async for msg in client.iter_messages(entity, min_id=after_id):
                if not msg.media:
                    continue
                await out(f"[{msg.id}] downloading...")
                path = await client.download_media(msg, file=DOWNLOAD_DIR, progress_callback=cb)
                if show_progress:
                    print()
                if path:
                    fix_perms(path)
                    count += 1
                    await out(f"[{msg.id}] saved: {os.path.basename(path)}")
                else:
                    await out(f"[{msg.id}] no downloadable media")
            await out(f"Done: {count} file(s)")
            if count > 0 and JELLYFIN_API_KEY:
                jellyfin_refresh()
                await out("Jellyfin scan triggered")
            return

        if target == "latest":
            msgs = await client.get_messages(entity, limit=1)
            if not msgs:
                await out("No messages found")
                return
            msg = msgs[0]
        else:
            msg_id = int(target)
            msg = await client.get_messages(entity, ids=msg_id)
            if not msg:
                await out(f"Message {msg_id} not found")
                return

        if not msg.media:
            await out("No media in this message")
            return

        await out("Downloading...")
        path = await client.download_media(msg, file=DOWNLOAD_DIR, progress_callback=cb)
        if show_progress:
            print()
        if path:
            fix_perms(path)
            await out(f"Saved: {os.path.basename(path)}")
            if JELLYFIN_API_KEY:
                jellyfin_refresh()
                await out("Jellyfin scan triggered")
        else:
            await out("Download failed")

    # --- CLI commands ---

    async def cmd_login():
        api_id, api_hash = get_credentials()
        client = TelegramClient(SESSION_PATH, api_id, api_hash)
        await client.start()
        me = await client.get_me()
        print(f"\nLogged in as: {me.first_name} (@{me.username})")
        await client.disconnect()

    async def cmd_chats(limit):
        api_id, api_hash = get_credentials()
        client = TelegramClient(SESSION_PATH, api_id, api_hash)
        await client.connect()
        if not await client.is_user_authorized():
            print("Not logged in. Run 'login' first.")
            return
        print(await do_chats(client, limit))
        await client.disconnect()

    async def cmd_recent(chat, limit):
        api_id, api_hash = get_credentials()
        client = TelegramClient(SESSION_PATH, api_id, api_hash)
        await client.connect()
        if not await client.is_user_authorized():
            print("Not logged in. Run 'login' first.")
            return
        print(await do_recent(client, chat, limit))
        await client.disconnect()

    async def cmd_download(chat, target):
        api_id, api_hash = get_credentials()
        client = TelegramClient(SESSION_PATH, api_id, api_hash)
        await client.connect()
        if not await client.is_user_authorized():
            print("Not logged in. Run 'login' first.")
            return
        await do_download(client, chat, target, show_progress=True)
        await client.disconnect()

    async def cmd_refresh():
        if not JELLYFIN_API_KEY:
            print("No JELLYFIN_API_KEY set")
            return
        if jellyfin_refresh():
            print("Jellyfin scan triggered")
        else:
            print("Jellyfin refresh failed")

    # --- Bot command ---

    async def cmd_serve():
        api_id, api_hash = get_credentials()
        bot_token = os.environ.get("TELEGRAM_BOT_TOKEN")
        if not bot_token:
            print("Error: TELEGRAM_BOT_TOKEN must be set")
            sys.exit(1)

        allowed_users = set()
        for u in os.environ.get("TELEGRAM_ALLOWED_USERS", "").split(","):
            u = u.strip()
            if u:
                allowed_users.add(int(u))

        user_client = TelegramClient(SESSION_PATH, api_id, api_hash)
        await user_client.connect()
        if not await user_client.is_user_authorized():
            print("User session not authorized.")
            print("Run: kubectl exec -it deploy/tg-media -n media -- python /app/tg-media.py login")
            print("Then: kubectl rollout restart deployment tg-media -n media")
            await user_client.disconnect()
            while True:
                await asyncio.sleep(3600)

        bot = TelegramClient(BOT_SESSION_PATH, api_id, api_hash)
        await bot.start(bot_token=bot_token)
        me = await bot.get_me()
        print(f"Bot started: @{me.username}")

        download_busy = False

        @bot.on(events.NewMessage())
        async def handler(event):
            nonlocal download_busy
            if event.sender_id not in allowed_users:
                return

            parts = (event.raw_text or "").split()
            if not parts:
                return
            cmd = parts[0].lower()
            args = parts[1:]

            try:
                if cmd in ("/help", "/start"):
                    await event.reply(
                        "Commands:\n"
                        "/chats [limit] - List recent chats\n"
                        "/recent <chat> [limit] - Show recent messages\n"
                        "/download <chat> <id|latest|after-id> - Download media\n"
                        "/refresh - Trigger Jellyfin scan\n"
                        "/status - Show bot status"
                    )
                elif cmd == "/chats":
                    limit = int(args[0]) if args else 50
                    await event.reply((await do_chats(user_client, limit))[:4096])
                elif cmd == "/recent":
                    if not args:
                        await event.reply("Usage: /recent <chat> [limit]")
                        return
                    chat = args[0]
                    limit = int(args[1]) if len(args) > 1 else 20
                    await event.reply((await do_recent(user_client, chat, limit))[:4096])
                elif cmd == "/download":
                    if len(args) < 2:
                        await event.reply("Usage: /download <chat> <id|latest|after-id>")
                        return
                    if download_busy:
                        await event.reply("Download in progress, please wait.")
                        return
                    download_busy = True
                    try:
                        await do_download(user_client, args[0], args[1], reply=event.reply)
                    finally:
                        download_busy = False
                elif cmd == "/refresh":
                    if jellyfin_refresh():
                        await event.reply("Jellyfin scan triggered")
                    else:
                        await event.reply("Jellyfin refresh failed")
                elif cmd == "/status":
                    me = await user_client.get_me()
                    await event.reply(
                        f"Bot: running\n"
                        f"User: {me.first_name} (@{me.username})\n"
                        f"Downloads: {DOWNLOAD_DIR}\n"
                        f"Jellyfin: {'ok' if JELLYFIN_API_KEY else 'not configured'}"
                    )
            except Exception as e:
                await event.reply(f"Error: {e}")

        await bot.run_until_disconnected()

    # --- Main ---

    def main():
        parser = argparse.ArgumentParser(prog="tg-media", description="Telegram media downloader")
        sub = parser.add_subparsers(dest="command", required=True)

        sub.add_parser("login", help="Interactive Telegram login (first time only)")
        sub.add_parser("serve", help="Start the control bot (long-running)")

        p_chats = sub.add_parser("chats", help="List recent chats")
        p_chats.add_argument("-n", "--limit", type=int, default=50, help="Number of chats")

        p_recent = sub.add_parser("recent", help="Show recent messages from a chat")
        p_recent.add_argument("chat", help="Chat username, ID, or phone")
        p_recent.add_argument("-n", "--limit", type=int, default=20, help="Number of messages")

        p_dl = sub.add_parser("download", help="Download media from a message")
        p_dl.add_argument("chat", help="Chat username, ID, or phone")
        p_dl.add_argument("target", help="Message ID, 'latest', or 'after-<id>'")

        sub.add_parser("refresh", help="Trigger Jellyfin library scan")

        args = parser.parse_args()

        if args.command == "login":
            asyncio.run(cmd_login())
        elif args.command == "serve":
            asyncio.run(cmd_serve())
        elif args.command == "chats":
            asyncio.run(cmd_chats(args.limit))
        elif args.command == "recent":
            asyncio.run(cmd_recent(args.chat, args.limit))
        elif args.command == "download":
            asyncio.run(cmd_download(args.chat, args.target))
        elif args.command == "refresh":
            asyncio.run(cmd_refresh())

    if __name__ == "__main__":
        main()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tg-media
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tg-media
  template:
    metadata:
      labels:
        app: tg-media
    spec:
      nodeSelector:
        kubernetes.io/hostname: pavan-vps
      containers:
      - name: tg-media
        image: python:3.12-slim
        command: ["/bin/sh", "-c"]
        args:
        - |
          pip install --quiet telethon && python /app/tg-media.py serve
        env:
        - name: TELEGRAM_API_ID
          valueFrom:
            secretKeyRef:
              name: tg-media-secrets
              key: TELEGRAM_API_ID
        - name: TELEGRAM_API_HASH
          valueFrom:
            secretKeyRef:
              name: tg-media-secrets
              key: TELEGRAM_API_HASH
        - name: TELEGRAM_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: tg-media-secrets
              key: TELEGRAM_BOT_TOKEN
        - name: TELEGRAM_ALLOWED_USERS
          valueFrom:
            secretKeyRef:
              name: tg-media-secrets
              key: TELEGRAM_ALLOWED_USERS
        - name: JELLYFIN_API_KEY
          valueFrom:
            secretKeyRef:
              name: tg-media-secrets
              key: JELLYFIN_API_KEY
        - name: JELLYFIN_HOST
          value: "http://jellyfin.media.svc.cluster.local:8096"
        volumeMounts:
        - name: script
          mountPath: /app/tg-media.py
          subPath: tg-media.py
        - name: downloads
          mountPath: /data/downloads/telegram
        - name: session
          mountPath: /data/session
        workingDir: /app
      volumes:
      - name: script
        configMap:
          name: tg-media-script
      - name: downloads
        hostPath:
          path: /mnt/data/media/downloads/telegram
          type: DirectoryOrCreate
      - name: session
        hostPath:
          path: /mnt/data/media/tg-media-session
          type: DirectoryOrCreate

# Secret template for tg-media downloader.
# Real secret is created via scripts/create-tg-media-secrets.sh.
# Do not commit real values.
---
apiVersion: v1
kind: Secret
metadata:
  name: tg-media-secrets
  namespace: media
type: Opaque
stringData:
  # Get api_id and api_hash from https://my.telegram.org -> API development tools
  TELEGRAM_API_ID: "your-api-id"
  TELEGRAM_API_HASH: "your-api-hash"
  # Bot token from @BotFather -> /newbot
  TELEGRAM_BOT_TOKEN: "your-bot-token"
  # Your Telegram user ID(s), comma-separated. Get from @userinfobot
  TELEGRAM_ALLOWED_USERS: "123456789"
  # Jellyfin API key: Dashboard > Advanced > API Keys
  JELLYFIN_API_KEY: "your-jellyfin-api-key"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
    spec:
      containers:
      - name: plex
        image: lscr.io/linuxserver/plex:latest
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "Etc/UTC"
        - name: VERSION
          value: docker
        ports:
        - containerPort: 32400
          name: http
        volumeMounts:
        - name: plex-config
          mountPath: /config
        - name: nextcloud-data
          mountPath: /data/nextcloud
          readOnly: true
        - name: movies
          mountPath: /data/movies
          readOnly: true
        - name: tv
          mountPath: /data/tv
          readOnly: true
        - name: downloads
          mountPath: /data/downloads
          readOnly: true
        - name: immich-library
          mountPath: /data/immich
          readOnly: true
      volumes:
      - name: plex-config
        hostPath:
          path: /mnt/data/media/plex-config
          type: DirectoryOrCreate
      - name: nextcloud-data
        hostPath:
          path: /mnt/data/nextcloud-data
          type: Directory
      - name: movies
        hostPath:
          path: /mnt/data/media/movies
          type: DirectoryOrCreate
      - name: tv
        hostPath:
          path: /mnt/data/media/tv
          type: DirectoryOrCreate
      - name: downloads
        hostPath:
          path: /mnt/data/media/downloads
          type: DirectoryOrCreate
      - name: immich-library
        hostPath:
          path: /mnt/data/immich-library
          type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: plex
  namespace: media
spec:
  ports:
  - port: 32400
    targetPort: 32400
  selector:
    app: plex
